# Build TypeDoc on push/PR; publish to GitHub Pages on push to master (and manual dispatch).
# Pages source: repo Settings → Pages → Build and deployment → GitHub Actions.
name: Docs

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'README.md'
      - 'CHANGELOG.md'
      - 'DESIGN_DOCUMENT.md'
      - 'benchmarks/README.md'
      - 'benchmarks/baselines/reference.json'
      - 'typedoc.json'
      - 'examples/plain_js/**'
      - 'dev/docs/**'
      - 'scripts/sync-docs-media.cjs'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [master]
    paths:
      - 'src/**'
      - 'README.md'
      - 'CHANGELOG.md'
      - 'DESIGN_DOCUMENT.md'
      - 'benchmarks/README.md'
      - 'benchmarks/baselines/reference.json'
      - 'dev/docs/**'
      - 'typedoc.json'
      - 'examples/plain_js/**'
      - 'scripts/sync-docs-media.cjs'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - name: Build docs for GitHub Pages
        if: github.event_name != 'pull_request'
        run: yarn build-docs:pages
      - name: Build docs (verify only)
        if: github.event_name == 'pull_request'
        run: yarn build-docs
      - name: Verify generated docs/media
        run: |
          test -f docs/media/DESIGN_DOCUMENT.md
          test -f docs/media/CHANGELOG.md
          test -f docs/media/README.md
          test -f docs/media/reference.json
          test -f docs/index.html
      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
