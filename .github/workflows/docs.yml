# Verify TypeDoc + docs/media on push/PR; publish to GitHub Pages on manual dispatch.
# First-time setup: repo Settings → Pages → Source: GitHub Actions, then run this workflow manually.
name: Docs

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'README.md'
      - 'CHANGELOG.md'
      - 'DESIGN_DOCUMENT.md'
      - 'benchmarks/README.md'
      - 'benchmarks/baselines/reference.json'
      - 'typedoc.json'
      - 'examples/plain_js/**'
      - 'scripts/sync-docs-media.cjs'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [master]
    paths:
      - 'src/**'
      - 'README.md'
      - 'CHANGELOG.md'
      - 'DESIGN_DOCUMENT.md'
      - 'benchmarks/README.md'
      - 'benchmarks/baselines/reference.json'
      - 'typedoc.json'
      - 'examples/plain_js/**'
      - 'scripts/sync-docs-media.cjs'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - run: yarn build-docs
      - name: Verify generated docs/media
        run: |
          test -f docs/media/DESIGN_DOCUMENT.md
          test -f docs/media/CHANGELOG.md
          test -f docs/media/README.md
          test -f docs/media/reference.json
          test -f docs/index.html

  deploy:
    needs: build
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - run: yarn build-docs
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
